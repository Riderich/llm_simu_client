# Qwen2.5-7B-Instruct SFT (QLoRA 4bit, 单卡 A2000 12GB)
# 运行: llamafactory-cli train train_config/qwen25_7b_sft.yaml

### 模型配置
model_name_or_path: Qwen/Qwen2.5-7B-Instruct

### 方法
stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,v_proj,k_proj,o_proj

### 量化（QLoRA 4bit，适配 A2000 12GB显存）
quantization_bit: 4
quantization_type: nf4

### 数据集
dataset: inner_monologue_sft
template: qwen
cutoff_len: 2048
max_samples: 99999

### 训练超参
output_dir: ./saves/qwen25_7b_sft
logging_dir: ./logs/qwen25_7b_sft
overwrite_output_dir: true

num_train_epochs: 3.0
per_device_train_batch_size: 2
gradient_accumulation_steps: 8   # 有效 batch size = 16
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true

### 保存
save_strategy: epoch
save_total_limit: 2
logging_steps: 10

### 评估（按需开启）
# eval_dataset: inner_monologue_sft_eval
# evaluation_strategy: epoch
# per_device_eval_batch_size: 2

### 预估: A2000 12GB 单卡，402条×3epoch ≈ 30-60分钟
