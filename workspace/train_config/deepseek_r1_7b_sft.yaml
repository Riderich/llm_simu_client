# DeepSeek-R1-Distill-Qwen-7B SFT (QLoRA 4bit, 单卡 A2000 12GB)
# 重点: 该模型本身就是 CoT 蒸馏模型，<internal> 格式学习可能更快
# 运行: llamafactory-cli train train_config/deepseek_r1_7b_sft.yaml

### 模型配置
model_name_or_path: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B

### 方法
stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,v_proj,k_proj,o_proj

### 量化（QLoRA 4bit）
quantization_bit: 4
quantization_type: nf4

### 数据集
dataset: inner_monologue_sft
template: qwen   # DeepSeek-R1-Distill-Qwen 系列用 qwen 模板
cutoff_len: 2048
max_samples: 99999

### 训练超参
output_dir: ./saves/deepseek_r1_7b_sft
logging_dir: ./logs/deepseek_r1_7b_sft
overwrite_output_dir: true

num_train_epochs: 3.0
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true

### 保存
save_strategy: epoch
save_total_limit: 2
logging_steps: 10

### 注意: DeepSeek-R1 系列有自己的 <think>...</think> 格式
### 我们用 <internal>...</internal> 替代，格式兼容
