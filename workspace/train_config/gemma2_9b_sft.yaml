# Gemma-2-9B-it SFT (QLoRA 4bit, 双卡 / 四卡 A2000)
# 注意: 9B 单卡需要更多显存，建议双卡 ZeRO-2
# 运行: deepspeed --num_gpus 2 llamafactory-cli train train_config/gemma2_9b_sft.yaml

### 模型配置
model_name_or_path: google/gemma-2-9b-it

### 方法
stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,v_proj,k_proj,o_proj

### 量化（QLoRA 4bit，以便单卡跑）
quantization_bit: 4
quantization_type: nf4

### 数据集
dataset: inner_monologue_sft
template: gemma
cutoff_len: 2048
max_samples: 99999

### 训练超参
output_dir: ./saves/gemma2_9b_sft
logging_dir: ./logs/gemma2_9b_sft
overwrite_output_dir: true

num_train_epochs: 3.0
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.5e-4
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true

### 多卡配置（可选，去掉注释使用 DeepSpeed ZeRO-2）
# deepspeed: ds_config/zero2.json

### 保存
save_strategy: epoch
save_total_limit: 2
logging_steps: 10
