# DPO 训练配置（在 SFT checkpoint 基础上继续对齐）
# 先运行 SFT，再运行此配置
# 运行: llamafactory-cli train train_config/qwen25_7b_dpo.yaml

### 模型配置（从 SFT 的 checkpoint 继续）
model_name_or_path: ./saves/qwen25_7b_sft

### 方法
stage: dpo
do_train: true
finetuning_type: lora

### 量化
quantization_bit: 4
quantization_type: nf4

### 数据集（preference 格式）
dataset: inner_monologue_dpo
template: qwen
cutoff_len: 2048

### DPO 超参
dpo_beta: 0.1        # 控制偏好强度，0.1-0.5 都可以试
dpo_loss: sigmoid    # 标准 DPO loss

### 训练超参
output_dir: ./saves/qwen25_7b_dpo
logging_dir: ./logs/qwen25_7b_dpo
overwrite_output_dir: true

num_train_epochs: 2.0
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-5   # DPO 学习率比 SFT 小
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true

### 保存
save_strategy: epoch
save_total_limit: 2
logging_steps: 10

### 注意: DPO 数据当前只有 26 条 resistance pairs，
### 建议先扩充数据（stride=1 全量或 SFT 模型生成更多负样本）再正式跑
